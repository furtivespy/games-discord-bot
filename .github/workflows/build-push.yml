name: Build and Push Docker Image

on:
  push:
    branches: ["**"]

env:
  REGISTRY: gitea.willsullivan.dev
  IMAGE_NAME: furtivespy/game-bot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract metadata
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ github.ref == 'refs/heads/main' && format('{0}/{1}:{2}\n{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME, steps.meta.outputs.sha_short) || format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, steps.meta.outputs.sha_short) }}
